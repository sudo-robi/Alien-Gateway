name: ZK Circuits CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  circuits:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zk

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: zk/package-lock.json  

    - name: Setup Node Modules Path
      run: echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH   
    - name: Install Rust (required for circom)
      uses: dtolnay/rust-toolchain@stable

    - name: Cache circom build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/circom/target
        key: ${{ runner.os }}-circom

    - name: Install circom
      run: |
        git clone https://github.com/iden3/circom.git
        cd circom
        cargo build --release
        cargo install --path circom
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Verify circom installation
      run: |
        which circom
        circom --version

    - name: Install npm dependencies (workspace)
      run: npm ci

    - name: Remove npm circom (use cargo version instead)
      run: |
        rm -rf node_modules/circom || true
        rm -f node_modules/.bin/circom || true

    - name: Compile circuits
      run: |
        chmod +x scripts/compile.sh
        bash scripts/compile.sh

    - name: Verify circuit compilation
      run: |
        for circuit in merkle_inclusion merkle_non_inclusion merkle_update merkle_update_proof username_merkle username_hash; do
          echo "── $circuit"
          ls -lh build/$circuit/$circuit.r1cs
          ls -lh build/$circuit/$circuit.sym
          ls -lh build/$circuit/wasm/${circuit}_js/$circuit.wasm
        done
        echo "✔ All circuits verified"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zk-build
        path: zk/build/
        retention-days: 7