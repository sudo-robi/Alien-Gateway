name: Pre-commit Hook Validation

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  validate-pre-commit:
    name: Validate Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 1. BRANCH NAMING CONVENTION
      # ─────────────────────────────────────────────
      - name: Validate branch naming convention
        if: github.event_name == 'pull_request'
        run: |
          echo "🌿 Validating branch name..."

          branch="${{ github.head_ref }}"

          # Allowed prefixes per CONTRIBUTING.md:
          # feat/, fix/, docs/, refactor/, test/, chore/
          branch_regex='^(feat|fix|docs|refactor|test|chore)/[a-z0-9][a-z0-9-]*[a-z0-9]$'

          if echo "$branch" | grep -qE "$branch_regex"; then
            echo "✅ Branch name '$branch' follows the naming convention."
          else
            echo "❌ Branch name '$branch' does NOT follow the naming convention."
            echo ""
            echo "✅ Expected format:  <prefix>/<short-description>"
            echo "   Allowed prefixes: feat, fix, docs, refactor, test, chore"
            echo "   Rules:            lowercase, hyphen-separated, no trailing hyphens"
            echo ""
            echo "   Examples:"
            echo "     feat/merkle-root-anchoring"
            echo "     fix/address-lookup-panic"
            echo "     docs/contributing-guide"
            exit 1
          fi

      # ─────────────────────────────────────────────
      # 2. BYPASS DETECTION
      # ─────────────────────────────────────────────
      - name: Check for bypassed commits
        run: |
          echo "🔍 Checking for bypassed pre-commit hooks..."

          commits=$(git log --oneline -10)

          bypass_commits=$(echo "$commits" | grep -iE "emergency.*bypass|no-verify|skip.*hook" || true)

          if [ -n "$bypass_commits" ]; then
            echo "⚠️  Found commits that bypassed pre-commit hooks:"
            echo "$bypass_commits"
            echo ""
            echo "❌ Emergency bypasses are not allowed in protected branches."
            echo "Please fix the issues and commit properly."
            exit 1
          else
            echo "✅ No bypassed commits found."
          fi

      # ─────────────────────────────────────────────
      # 3. COMMIT MESSAGE FORMAT (Conventional Commits)
      # ─────────────────────────────────────────────
      - name: Validate commit message format
        run: |
          echo "📝 Validating commit message format..."

          # Conventional Commits — must match types defined in CONTRIBUTING.md
          commit_regex='^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .{1,72}'

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            commits=$(git log --pretty=format:"%s" ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git log --pretty=format:"%s" -10)
          else
            commits=$(git log --pretty=format:"%s" origin/main..HEAD)
          fi

          invalid_commits=""

          while IFS= read -r message; do
            # Skip empty lines and git-generated merge commits
            if [ -z "$message" ] || echo "$message" | grep -qE "^Merge (branch|pull request|remote-tracking branch|[0-9a-f]{7,40}) "; then
              continue
            fi
            if ! echo "$message" | grep -qE "$commit_regex"; then
              invalid_commits="$invalid_commits\n  - $message"
            fi
          done <<< "$commits"

          if [ -n "$invalid_commits" ]; then
            echo "❌ Invalid commit messages found:"
            echo -e "$invalid_commits"
            echo ""
            echo "✅ Use the Conventional Commits format:"
            echo "   <type>(<scope>): <description>"
            echo ""
            echo "   Allowed types: feat, fix, docs, refactor, test, chore, perf, ci, build, revert"
            echo ""
            echo "   Examples:"
            echo "     feat(contract): add merkle root anchoring to registry"
            echo "     fix(address-manager): resolve panic on empty username lookup"
            echo "     docs: add contributing guide for new contributors"
            exit 1
          else
            echo "✅ All commit messages follow the Conventional Commits format."
          fi

      # ─────────────────────────────────────────────
      # 4. CONSOLE.LOG DETECTION  (JS/TS files)
      # ─────────────────────────────────────────────
      - name: Check for console.log statements
        run: |
          echo "🔍 Checking for console.log statements..."

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            changed_files=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git diff --name-only HEAD~1)
          else
            changed_files=$(git diff --name-only origin/main..HEAD)
          fi

          console_log_found=false

          for file in $changed_files; do
            if [[ "$file" =~ \.(ts|tsx|js|jsx)$ ]] && [ -f "$file" ]; then
              if grep -n "console\.log" "$file"; then
                echo "❌ Found console.log in $file"
                console_log_found=true
              fi
            fi
          done

          if [ "$console_log_found" = true ]; then
            echo ""
            echo "❌ console.log statements found. Please remove them before merging."
            exit 1
          else
            echo "✅ No console.log statements found."
          fi

      # ─────────────────────────────────────────────
      # 5. TODO / FIXME DETECTION
      # ─────────────────────────────────────────────
      - name: Check for TODO/FIXME comments
        run: |
          echo "🔍 Checking for TODO/FIXME comments..."

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            changed_files=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git diff --name-only HEAD~1)
          else
            changed_files=$(git diff --name-only origin/main..HEAD)
          fi

          todo_found=false

          for file in $changed_files; do
            # Check Rust and JS/TS files
            if [[ "$file" =~ \.(rs|ts|tsx|js|jsx)$ ]] && [ -f "$file" ]; then
              if grep -nE "TODO|FIXME" "$file"; then
                echo "⚠️  Found TODO/FIXME in $file"
                todo_found=true
              fi
            fi
          done

          if [ "$todo_found" = true ]; then
            echo ""
            echo "⚠️  TODO/FIXME comments found. Please address them before merging."
            # Warning only — does not fail the build
          else
            echo "✅ No TODO/FIXME comments found."
          fi

      # ─────────────────────────────────────────────
      # 6. RUST — unwrap() / expect() SAFETY CHECK
      # ─────────────────────────────────────────────
      - name: Check for unsafe unwrap/expect usage in Rust
        run: |
          echo "🦀 Checking for unsafe .unwrap() / .expect() in Rust files..."

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            changed_files=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git diff --name-only HEAD~1)
          else
            changed_files=$(git diff --name-only origin/main..HEAD)
          fi

          unwrap_found=false

          for file in $changed_files; do
            if [[ "$file" =~ \.rs$ ]] && [ -f "$file" ]; then
              # Allow unwrap/expect only in test modules
              if grep -n "\.unwrap()\|\.expect(" "$file" | grep -v "#\[cfg(test)\]" | grep -v "//.*\.unwrap()\|//.*\.expect("; then
                echo "⚠️  Found .unwrap()/.expect() in $file"
                unwrap_found=true
              fi
            fi
          done

          if [ "$unwrap_found" = true ]; then
            echo ""
            echo "⚠️  Unsafe .unwrap()/.expect() found outside of test modules."
            echo "Consider using proper error handling (Result/Option propagation) in contract code."
            # Warning only — does not fail the build (maintainer discretion)
          else
            echo "✅ No unsafe unwrap/expect found in changed Rust files."
          fi